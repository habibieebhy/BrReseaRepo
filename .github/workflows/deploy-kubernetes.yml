name: Deploy BRIXTA to self-hosted Kubernetes

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git tag or commit containing the matching Kubernetes manifests"
        required: true
        default: "main"
      image_tag:
        description: "Previously published immutable image tag (for example 2.1.0 or sha-abc1234)"
        required: true
      environment:
        description: "GitHub Environment requiring deployment approval"
        required: true
        default: production

permissions:
  contents: read

concurrency:
  group: brixta-production
  cancel-in-progress: false

jobs:
  deploy:
    # Install a GitHub Actions runner on the server with kubectl access and the
    # labels: self-hosted, linux, brixta-production.
    runs-on: [self-hosted, linux, brixta-production]
    environment: ${{ inputs.environment }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Confirm cluster access
        run: |
          kubectl cluster-info
          bash -n ./start.sh
      - name: Deploy immutable images
        env:
          SECRETS_MODE: infisical
          BRIXTA_IMAGE_REGISTRY: docker.io/goswamirohit
          BRIXTA_IMAGE_TAG: ${{ inputs.image_tag }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: bash ./start.sh
      - name: Capture rollout state
        if: always()
        run: kubectl -n brixta get pods,deployments,services
