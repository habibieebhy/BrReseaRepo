name: Verify and publish BRIXTA images

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  REGISTRY_NAMESPACE: goswamirohit

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-api.txt
      - name: Install lightweight test dependencies
        run: >-
          python -m pip install -r requirements-api.txt
          'fastmcp>=2.14,<2.15'
          'py-key-value-aio[redis]>=0.3,<0.4'
      - name: Compile Python sources
        run: python -m compileall -q api brixta_cli brixta_mcp brixta_sdk core plugins runtime tests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Build MCP tool catalog
        env:
          BRIXTA_MCP_AUTH_MODE: none
          BRIXTA_MCP_TENANT_ID: ci-test
        run: python -c "from brixta_mcp.server import create_server; create_server()"

  dashboard-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brixta-dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: brixta-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  build-images:
    needs: [backend-tests, dashboard-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: brresearepo
            dockerfile: Dockerfile
          - image: brresearepo-dashboard
            dockerfile: brixta-dashboard/Dockerfile
          - image: brresearepo-openfoam
            dockerfile: Dockerfile.openfoam
          - image: brresearepo-simulations
            dockerfile: Dockerfile.simulations
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Generate immutable image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BRIXTA_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
