apiVersion: apps/v1
kind: Deployment
metadata:
  name: brixta-dashboard
  namespace: brixta
  labels:
    app: brixta-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brixta-dashboard
  template:
    metadata:
      labels:
        app: brixta-dashboard
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: docker.io/goswamirohit/brresearepo-dashboard:2.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PYTHON_BACKEND_URL
              value: http://gateway-service
            - name: BRIXTA_DASHBOARD_AUTH_MODE
              value: auth0
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH0_DOMAIN
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH0_CLIENT_ID
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH0_CLIENT_SECRET
            - name: AUTH0_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH0_SECRET
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_BASE_URL
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH0_AUDIENCE
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: brixta-dashboard-service
  namespace: brixta
spec:
  # The host-managed Cloudflare Tunnel connects to this NodePort.
  type: NodePort
  selector:
    app: brixta-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30020
