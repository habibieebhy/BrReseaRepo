apiVersion: apps/v1
kind: Deployment
metadata:
  name: brixta-dashboard
  namespace: brixta
  labels:
    app: brixta-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brixta-dashboard
  template:
    metadata:
      labels:
        app: brixta-dashboard
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: ghcr.io/brixtaorg/brresearepo-dashboard:2.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PYTHON_BACKEND_URL
              value: http://gateway-service
            - name: BRIXTA_DASHBOARD_AUTH_MODE
              value: cloudflare-access
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: brixta-dashboard-service
  namespace: brixta
spec:
  type: ClusterIP
  selector:
    app: brixta-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
