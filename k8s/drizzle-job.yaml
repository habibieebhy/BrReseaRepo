apiVersion: batch/v1
kind: Job
metadata:
  name: brixta-migration
  namespace: brixta
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: brixta-migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: ghcr.io/brixtaorg/brresearepo-core:2.1.0
          imagePullPolicy: IfNotPresent
          workingDir: /app/infra
          command: ["node", "migrate.mjs"]
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: npm_config_cache
              value: /tmp/.npm
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
