apiVersion: batch/v1
kind: Job
metadata:
  name: drizzle-migration
spec:
  template:
    spec:
      containers:
      - name: migration
        image: docker.io/goswamirohit/brresearepo:v4
        workingDir: /app/infra
        command: ["/bin/sh", "-c", "npm install && npx drizzle-kit push --config=drizzle.config.ts"]        
        envFrom:
        - secretRef:
            name: app-secrets
        env:
        - name: npm_config_cache
          value: "/tmp/.npm"
      restartPolicy: OnFailure