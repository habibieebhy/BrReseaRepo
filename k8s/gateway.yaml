apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: brixta
  labels:
    app: gateway
    app.kubernetes.io/part-of: brixta
spec:
  # Settings still use the shared control-plane file. Keep one API replica
  # until that final mutable repository moves to PostgreSQL.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: docker.io/goswamirohit/brresearepo:2.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: BRIXTA_ENVIRONMENT
              value: production
            - name: BRIXTA_CONTROL_PLANE_BACKEND
              value: postgres
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-storage
              mountPath: /app/storage
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: brixta-shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: brixta
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: http
