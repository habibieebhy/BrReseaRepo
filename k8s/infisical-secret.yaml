apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: infisical-sync
  namespace: brixta
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: brixta
      secretsScope:
        projectSlug: "brixta-research-6y6-z"
        envSlug: "prod"
        secretsPath: "/"
  managedSecretReference:
    secretName: app-secrets
    secretNamespace: brixta
