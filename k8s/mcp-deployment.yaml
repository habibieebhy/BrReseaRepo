apiVersion: apps/v1
kind: Deployment
metadata:
  name: brixta-mcp
  namespace: brixta
  labels:
    app: brixta-mcp
spec:
  # FastMCP HTTP sessions are process-local in this release.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: brixta-mcp
  template:
    metadata:
      labels:
        app: brixta-mcp
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp
          image: docker.io/goswamirohit/brresearepo:2.1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "api.mcp_server"]
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: BRIXTA_ENVIRONMENT
              value: production
            - name: BRIXTA_CONTROL_PLANE_BACKEND
              value: postgres
            - name: BRIXTA_MCP_HOST
              value: 0.0.0.0
            - name: BRIXTA_MCP_PORT
              value: "8001"
            - name: BRIXTA_MCP_TRANSPORT
              value: http
            - name: HF_HOME
              value: /cache/huggingface
          ports:
            - name: mcp-http
              containerPort: 8001
          startupProbe:
            tcpSocket:
              port: mcp-http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: mcp-http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mcp-http
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-cache
              mountPath: /cache
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 20Gi
