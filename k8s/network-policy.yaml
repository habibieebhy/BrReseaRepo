apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: brixta
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-to-public-services
  namespace: brixta
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [brixta-dashboard, brixta-mcp, minio]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-to-gateway
  namespace: brixta
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: brixta-dashboard
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: internal-data-services
  namespace: brixta
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [redis, minio]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: {}
