apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-embeddings
  namespace: brixta
  labels:
    app: worker-embeddings
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-embeddings
  template:
    metadata:
      labels:
        app: worker-embeddings
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 600
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: celery-embeddings
          image: ghcr.io/brixtaorg/brresearepo-core:2.1.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - celery
            - -A
            - runtime.celery_app.celery
            - worker
            - --loglevel=info
            - --queues=embeddings,storage
            - --concurrency=1
            - --hostname=embeddings@%h
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: BRIXTA_ENVIRONMENT
              value: production
            - name: BRIXTA_CONTROL_PLANE_BACKEND
              value: postgres
            - name: HF_HOME
              value: /cache/huggingface
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-storage
              mountPath: /app/storage
            - name: model-cache
              mountPath: /cache
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: brixta-shared-pvc
        - name: model-cache
          emptyDir:
            sizeLimit: 20Gi
