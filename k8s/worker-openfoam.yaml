apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-simulations-openfoam
  namespace: brixta
  labels:
    app: worker-simulations-openfoam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-simulations-openfoam
  template:
    metadata:
      labels:
        app: worker-simulations-openfoam
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: celery-openfoam
          image: docker.io/goswamirohit/brresearepo-openfoam:2.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: BRIXTA_ENVIRONMENT
              value: production
            - name: SIMULATION_TIMEOUT_SECONDS
              value: "3600"
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-storage
              mountPath: /app/storage
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: brixta-shared-pvc
