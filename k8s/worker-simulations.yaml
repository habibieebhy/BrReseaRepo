apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-simulations-calculix
  labels:
    app: worker-simulations-calculix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-simulations-calculix
  template:
    metadata:
      labels:
        app: worker-simulations-calculix
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: celery-simulations
          image: your-registry/brixta-simulations:2.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: REDIS_URL
              value: redis://redis-service:6379/0
            - name: CALCULIX_EXECUTABLE
              value: ccx
            - name: SIMULATION_TIMEOUT_SECONDS
              value: "1800"
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
