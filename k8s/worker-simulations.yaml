apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-simulations-calculix
  namespace: brixta
  labels:
    app: worker-simulations-calculix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-simulations-calculix
  template:
    metadata:
      labels:
        app: worker-simulations-calculix
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: celery-simulations
          image: ghcr.io/brixtaorg/brresearepo-simulations:2.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: BRIXTA_ENVIRONMENT
              value: production
            - name: CALCULIX_EXECUTABLE
              value: ccx
            - name: SIMULATION_TIMEOUT_SECONDS
              value: "1800"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-storage
              mountPath: /app/storage
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: brixta-shared-pvc
