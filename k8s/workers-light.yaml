apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers-light
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workers-light
  template:
    metadata:
      labels:
        app: workers-light
    spec:
      containers:
      - name: celery
        image: docker.io/goswamirohit/brresearepo:v2
        command: ["celery", "-A", "workers.celery_app", "worker", "-Q", "chunker,downloader,parser,storage", "--loglevel=info"]
        envFrom:
        - secretRef:
            name: app-secrets
        env:
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/0"
        - name: HF_HOME
          value: "/tmp/huggingface"
        volumeMounts:
        - name: shared-storage
          mountPath: /app/storage
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: storage-pvc